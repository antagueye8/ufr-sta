{% extends "base.html" %}

{% block titre %}
    {% if actualite %}Modifier{% else %}Ajouter{% endif %} une actualité
{% endblock %}

{% block contenu %}
<h2>{% if actualite %}Modifier{% else %}Ajouter{% endif %} une actualité</h2>

<form method="POST">
    <label for="titre">Titre :</label><br>
    <input type="text" id="titre" name="titre" value="{{ actualite.titre if actualite else '' }}" required><br><br>

    <label for="date">Date :</label><br>
    <input type="date" id="date" name="date" value="{{ actualite.date if actualite else '' }}" required><br><br>

    <label for="description">Description :</label><br>
    <textarea id="description" name="description" required>{{ actualite.description if actualite else '' }}</textarea><br><br>

    <label for="photo">Photo (nom du fichier, optionnel) :</label><br>
    <input type="text" id="photo" name="photo" value="{{ actualite.photo if actualite else '' }}"><br><br>

    <button type="submit">Enregistrer</button>
</form>

{% endblock %}
