{% extends "base.html" %}

{% block titre %}{{ 'Modifier' if actualite else 'Ajouter' }} une actualité{% endblock %}

{% block contenu %}
<div class="page-head">
    <div class="container">
        <div class="breadcrumb"><a href="{{ url_for('admin_actualites') }}">Admin / Actualités</a> / {{ 'Modifier' if actualite else 'Ajouter' }}</div>
        <h1>{{ 'Modifier' if actualite else 'Ajouter' }} une actualité</h1>
    </div>
</div>
<section>
    <div class="container" style="max-width:600px;">
        <form method="POST">
            <div class="form-field">
                <label for="titre">Titre</label>
                <input type="text" id="titre" name="titre" value="{{ actualite.titre if actualite else '' }}" required>
            </div>
            <div class="form-field">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" value="{{ actualite.date if actualite else '' }}" required>
            </div>
            <div class="form-field">
                <label for="description">Description</label>
                <textarea id="description" name="description" required>{{ actualite.description if actualite else '' }}</textarea>
            </div>
            <div class="form-field">
                <label for="photo">Photo (nom du fichier, optionnel)</label>
                <input type="text" id="photo" name="photo" value="{{ actualite.photo if actualite else '' }}">
            </div>
            <button class="btn btn-primary" type="submit">Enregistrer</button>
        </form>
    </div>
</section>
{% endblock %}
