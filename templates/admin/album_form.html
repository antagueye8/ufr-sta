{% extends "base.html" %}

{% block titre %}Ajouter un album{% endblock %}

{% block contenu %}
<div class="page-head">
    <div class="container">
        <div class="breadcrumb"><a href="{{ url_for('admin_galerie') }}">Admin / Galerie</a> / Ajouter</div>
        <h1>Ajouter un album</h1>
    </div>
</div>
<section>
    <div class="container" style="max-width:600px;">
        <form method="POST">
            <div class="form-field">
                <label for="titre">Titre de l'album</label>
                <input type="text" id="titre" name="titre" required>
            </div>
            <div class="form-field">
                <label for="date">Date</label>
                <input type="text" id="date" name="date" placeholder="ex: 2026" required>
            </div>
            <div class="form-field">
                <label for="description">Description</label>
                <textarea id="description" name="description" required></textarea>
            </div>
            <div class="form-field">
                <label for="photos">Photos <span class="hint">(noms de fichiers séparés par des virgules)</span></label>
                <input type="text" id="photos" name="photos">
            </div>
            <button class="btn btn-primary" type="submit">Enregistrer</button>
        </form>
    </div>
</section>
{% endblock %}
