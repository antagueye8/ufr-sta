{% extends "base.html" %}

{% block titre %}Ajouter un album{% endblock %}

{% block contenu %}
<h2>Ajouter un album</h2>

<form method="POST">
    <label for="titre">Titre de l'album :</label><br>
    <input type="text" id="titre" name="titre" required><br><br>

    <label for="date">Date :</label><br>
    <input type="date" id="date" name="date" required><br><br>

    <label for="description">Description :</label><br>
    <textarea id="description" name="description"></textarea><br><br>

    <label for="photos">Photos (noms de fichiers séparés par des virgules) :</label><br>
    <input type="text" id="photos" name="photos" placeholder="photo1.jpg, photo2.jpg, photo3.jpg"><br><br>

    <button type="submit">Enregistrer</button>
</form>

{% endblock %}
